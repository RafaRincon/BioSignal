name: biosignal
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # --- Python ---
  - python=3.11
  - pip

  # --- R ---
  - r-base=4.3
  - r-essentials

  # --- System libraries ---
  - libxml2
  - libcurl
  - openssl
  - zlib

  # --- Python packages via conda ---
  - numpy=1.26
  - pandas=2.1
  - scipy=1.11
  - scikit-learn=1.4
  - matplotlib=3.8
  - seaborn=0.13
  - pyarrow=14
  - jupyter
  - jupyterlab
  - ipykernel

  # --- Python packages via pip ---
  - pip:
    - biopython==1.83
    - GEOparse==2.0.4
    - pydeseq2==0.4.9
    - gseapy==1.1.1
    - rpy2==3.5.14
    - langchain==0.2.16
    - langchain-openai==0.1.23
    - langchain-anthropic==0.1.23
    - openai==1.35.14
    - anthropic==0.28.1
    - statsmodels==0.14.1
    - fastparquet==2023.10.1
    - reportlab==4.1.0
    - fpdf2==2.7.9
    - pydantic==2.5.3
    - pydantic-settings==2.1.0
    - click==8.1.7
    - typer==0.9.0
    - rich==13.7.0
    - loguru==0.7.2
    - python-dotenv==1.0.0
    - PyYAML==6.0.1
    - plotly==5.18.0
    - pytest==7.4.4
    - pytest-cov==4.1.0
    - black==23.12.1
    - requests==2.31.0